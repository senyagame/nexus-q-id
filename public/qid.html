<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QID | Профиль NEXUS-Q</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>

    <style>
        :root {
            --accent-yellow: #ffcc00;
            --nexus-primary: #6366f1;
            --nexus-secondary: #a855f7;
            --bg-light: #f3f3f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            width: 420px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--nexus-primary), var(--nexus-secondary));
            border-radius: 14px;
            font-weight: 900;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid var(--accent-yellow);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-row {
            text-align: left;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 11px;
            color: #8b8e94;
            text-transform: uppercase;
            font-weight: 700;
        }

        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            word-break: break-all;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--nexus-primary);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            background: var(--nexus-primary);
            color: white;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        #auth-section, #profile-section, #reg-fields-container {
            display: none;
        }

        #buttonContainerId {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">Q</div>

        <div id="auth-section">
            <h1 id="auth-title" class="text-2xl font-bold mb-2">Войти в QID</h1>
            <p class="text-gray-500 mb-6 text-sm">Nexus-Q Ecosystem Auth</p>

            <form id="auth-form">
                <div id="reg-fields-container">
                    <input type="text" id="reg-username" placeholder="Придумайте логин" class="input-field">
                </div>
                
                <input type="email" id="auth-email" placeholder="Email" class="input-field" required>
                <input type="password" id="auth-password" placeholder="Пароль" class="input-field" required>
                
                <button type="submit" id="btn-submit-form" class="btn-main mb-4">Войти</button>
            </form>

            <p class="text-xs text-gray-400 mb-6">
                <span id="toggle-text-label">Нет аккаунта?</span> 
                <span class="text-indigo-500 font-bold cursor-pointer hover:underline" onclick="switchAuthMode()" id="toggle-link-btn">Создать QID</span>
            </p>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink mx-4 text-gray-300 text-[10px] font-bold tracking-widest uppercase">Или войти через</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <button type="button" class="flex items-center justify-center gap-3 w-full p-3 border border-gray-200 rounded-[20px] font-semibold text-sm hover:bg-gray-50 transition" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" width="18" alt="Google">
                    Google
                </button>
                
                <div id="buttonContainerId"></div>
            </div>
        </div>

        <div id="profile-section">
            <div class="avatar-circle">
                <img id="user-avatar-img" src="" alt="Avatar">
            </div>
            <h1 class="text-xl font-bold mb-6">Профиль QID</h1>

            <div class="info-row">
                <div class="info-label">Логин / Никнейм</div>
                <div id="profile-display-name" class="info-value text-indigo-600">@—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Email адрес</div>
                <div id="profile-email" class="info-value">—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Nexus ID</div>
                <div id="profile-uid" class="info-value text-[10px] opacity-40">—</div>
            </div>

            <button onclick="signOutUser()" class="mt-8 text-red-500 text-sm font-bold hover:opacity-70 transition cursor-pointer">
                Выйти из аккаунта
            </button>
        </div>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB8FCa1mDuyrzPTKXL_dNeA5BtQtmK9e50",
            authDomain: "nexus-q-ceb47.firebaseapp.com",
            projectId: "nexus-q-ceb47",
            storageBucket: "nexus-q-ceb47.firebasestorage.app",
            messagingSenderId: "1089083193362",
            appId: "1:1089083193362:web:77d047bc1770f14d7080cb"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const firebaseAuth = firebase.auth();
        const googleAuthProvider = new firebase.auth.GoogleAuthProvider();

        // 2. ИНИЦИАЛИЗАЦИЯ ЯНДЕКС ID
        window.onload = function() {
            window.YaAuthSuggest.init(
                {
                    client_id: "7b84bc72719444d9bc04d72106619f4a",
                    response_type: "token",
                    redirect_uri: window.location.href
                },
                window.location.origin,
                {
                    view: "button",
                    parentId: "buttonContainerId",
                    buttonSize: 'm',
                    buttonView: 'main',
                    buttonTheme: 'light',
                    buttonBorderRadius: "20",
                    buttonIcon: 'ya',
                }
            )
            .then(function(result) {
                return result.handler();
            })
            .then(function(data) {
                console.log('Данные Яндекса получены:', data);
                processYandexAuth(data);
            })
            .catch(function(error) {
                console.log('Ошибка Яндекс SDK:', error);
            });
        };

        // Обработка данных после входа через Яндекс
        function processYandexAuth(data) {
            // В данном примере мы просто имитируем вход. 
            // В продакшене тут обычно идет обмен токена на данные пользователя.
            alert("Вы успешно авторизованы через Яндекс ID!");
            console.log("Access Token:", data.access_token);
        }

        // 3. ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ВХОД / РЕГИСТРАЦИЯ
        let currentModeIsLogin = true;

        function switchAuthMode() {
            currentModeIsLogin = !currentModeIsLogin;
            
            const titleElement = document.getElementById('auth-title');
            const submitBtn = document.getElementById('btn-submit-form');
            const regFields = document.getElementById('reg-fields-container');
            const toggleText = document.getElementById('toggle-text-label');
            const toggleBtn = document.getElementById('toggle-link-btn');

            if (currentModeIsLogin) {
                titleElement.innerText = "Войти в QID";
                submitBtn.innerText = "Войти";
                regFields.style.display = "none";
                toggleText.innerText = "Нет аккаунта?";
                toggleBtn.innerText = "Создать QID";
            } else {
                titleElement.innerText = "Создать QID";
                submitBtn.innerText = "Зарегистрироваться";
                regFields.style.display = "block";
                toggleText.innerText = "Уже есть аккаунт?";
                toggleBtn.innerText = "Войти";
            }
        }

        // 4. ОБРАБОТКА ФОРМЫ (ВХОД И РЕГИСТРАЦИЯ)
        const authForm = document.getElementById('auth-form');
        authForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const emailValue = document.getElementById('auth-email').value;
            const passwordValue = document.getElementById('auth-password').value;
            const usernameValue = document.getElementById('reg-username').value;

            if (currentModeIsLogin) {
                // Вход
                firebaseAuth.signInWithEmailAndPassword(emailValue, passwordValue)
                    .catch(function(error) {
                        alert("Ошибка входа: " + error.message);
                    });
            } else {
                // Регистрация
                firebaseAuth.createUserWithEmailAndPassword(emailValue, passwordValue)
                    .then(function(userCredential) {
                        // После создания аккаунта обновляем имя пользователя (логин)
                        return userCredential.user.updateProfile({
                            displayName: usernameValue
                        });
                    })
                    .then(function() {
                        alert("Аккаунт QID успешно создан!");
                        window.location.reload();
                    })
                    .catch(function(error) {
                        alert("Ошибка регистрации: " + error.message);
                    });
            }
        });

        // 5. ВХОД ЧЕРЕЗ GOOGLE
        function signInWithGoogle() {
            firebaseAuth.signInWithPopup(googleAuthProvider)
                .catch(function(error) {
                    alert("Ошибка Google: " + error.message);
                });
        }

        // 6. ВЫХОД ИЗ СИСТЕМЫ
        function signOutUser() {
            firebaseAuth.signOut()
                .then(function() {
                    console.log("Пользователь вышел");
                })
                .catch(function(error) {
                    alert("Ошибка при выходе: " + error.message);
                });
        }

        // 7. СЛУШАТЕЛЬ СОСТОЯНИЯ АВТОРИЗАЦИИ
        firebaseAuth.onAuthStateChanged(function(user) {
            const authSection = document.getElementById('auth-section');
            const profileSection = document.getElementById('profile-section');

            if (user) {
                // Пользователь вошел
                authSection.style.display = "none";
                profileSection.style.display = "block";

                document.getElementById('profile-display-name').innerText = user.displayName ? "@" + user.displayName : "@nexus_user";
                document.getElementById('profile-email').innerText = user.email;
                document.getElementById('profile-uid').innerText = user.uid;
                
                // Установка аватарки (из Google или генерация по имени)
                const avatarImg = document.getElementById('user-avatar-img');
                if (user.photoURL) {
                    avatarImg.src = user.photoURL;
                } else {
                    const nameForAvatar = user.displayName || user.email;
                    avatarImg.src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(nameForAvatar) + "&background=6366f1&color=fff&bold=true";
                }
            } else {
                // Пользователь не авторизован
                authSection.style.display = "block";
                profileSection.style.display = "none";
            }
        });
    </script>
</body>
</html>
