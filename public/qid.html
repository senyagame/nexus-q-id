<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QID | Профиль NEXUS-Q</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>

    <style>
        :root {
            --accent-yellow: #ffcc00;
            --nexus-primary: #6366f1;
            --nexus-secondary: #a855f7;
            --bg-light: #f3f3f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            width: 420px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--nexus-primary), var(--nexus-secondary));
            border-radius: 14px;
            font-weight: 900;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid var(--accent-yellow);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-row {
            text-align: left;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 11px;
            color: #8b8e94;
            text-transform: uppercase;
            font-weight: 700;
        }

        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            word-break: break-all;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--nexus-primary);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            background: var(--nexus-primary);
            color: white;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        #auth-section, #profile-section, #reg-fields-container {
            display: none;
        }

        #buttonContainerId {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">Q</div>

        <div id="auth-section">
            <h1 id="auth-title" class="text-2xl font-bold mb-2">Войти в QID</h1>
            <p class="text-gray-500 mb-6 text-sm">Nexus-Q Ecosystem Auth</p>

            <form id="auth-form">
                <div id="reg-fields-container">
                    <input type="text" id="reg-username" placeholder="Придумайте логин" class="input-field">
                    <input type="text" id="reg-fullname" placeholder="Ваше полное имя" class="input-field">
                </div>
                
                <input type="email" id="auth-email" placeholder="Email" class="input-field" required>
                <input type="password" id="auth-password" placeholder="Пароль" class="input-field" required>
                
                <button type="submit" id="btn-submit-form" class="btn-main mb-4">Войти</button>
            </form>

            <p class="text-xs text-gray-400 mb-6">
                <span id="toggle-text-label">Нет аккаунта?</span> 
                <span class="text-indigo-500 font-bold cursor-pointer hover:underline" onclick="switchAuthMode()" id="toggle-link-btn">Создать QID</span>
            </p>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink mx-4 text-gray-300 text-[10px] font-bold uppercase tracking-widest">ИЛИ</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <button type="button" class="flex items-center justify-center gap-3 w-full p-3 border border-gray-200 rounded-[20px] font-semibold text-sm hover:bg-gray-50 transition" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" width="18" alt="Google">
                    Google
                </button>
                
                <div id="buttonContainerId"></div>
            </div>
        </div>

        <div id="profile-section">
            <div class="avatar-circle">
                <img id="user-avatar-img" src="" alt="Avatar">
            </div>
            <h1 class="text-xl font-bold mb-6">Профиль QID</h1>

            <div class="info-row">
                <div class="info-label">Username</div>
                <div id="profile-display-name" class="info-value text-indigo-600">@—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Full Name</div>
                <div id="profile-full-name" class="info-value">—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Email</div>
                <div id="profile-email" class="info-value">—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Nexus ID</div>
                <div id="profile-uid" class="info-value text-[10px] opacity-40">—</div>
            </div>

            <button onclick="firebase.auth().signOut()" class="mt-8 text-red-500 text-sm font-bold hover:opacity-70 transition cursor-pointer">
                Выйти из системы
            </button>
        </div>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ СЕРВИСОВ
        const firebaseConfig = {
            apiKey: "AIzaSyB8FCa1mDuyrzPTKXL_dNeA5BtQtmK9e50",
            authDomain: "nexus-q-ceb47.firebaseapp.com",
            projectId: "nexus-q-ceb47",
            storageBucket: "nexus-q-ceb47.firebasestorage.app",
            messagingSenderId: "1089083193362",
            appId: "1:1089083193362:web:77d047bc1770f14d7080cb"
        };

        const supabaseUrl = 'https://vfynermzgdtqmvnbzkah.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmeW5lcm16Z2R0cW12bmJ6a2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTg3NTksImV4cCI6MjA4ODI3NDc1OX0.dM9nBDrEYctP8sNJiUTV4lczM_sq0G480-IQt6fw094';

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const fbAuth = firebase.auth();
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // 2. СИНХРОНИЗАЦИЯ С SUPABASE
        async function syncProfileToSupabase(user, username = '', fullname = '') {
            const { error } = await supabaseClient
                .from('profiles')
                .upsert({
                    id: user.uid,
                    updated_at: new Date(),
                    username: username || user.displayName || user.email.split('@')[0],
                    full_name: fullname || user.displayName || '',
                    avatar_url: user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=6366f1&color=fff`
                });

            if (error) console.error('Supabase Sync Error:', error);
        }

        // 3. ЛОГИКА ЯНДЕКС ID
        window.onload = function() {
            const yandexRedirectUri = "https://nexus-q-site.vercel.app/qid.html";

            window.YaAuthSuggest.init(
                {
                    client_id: "7b84bc72719444d9bc04d72106619f4a",
                    response_type: "token",
                    redirect_uri: yandexRedirectUri
                },
                window.location.origin,
                {
                    view: "button",
                    parentId: "buttonContainerId",
                    buttonSize: 'm',
                    buttonView: 'main',
                    buttonTheme: 'light',
                    buttonBorderRadius: "20",
                    buttonIcon: 'ya',
                }
            )
            .then(result => result.handler())
            .then(data => {
                console.log('Yandex Token:', data.access_token);
                // Тут можно добавить логику создания профиля на основе данных Яндекса
            })
            .catch(error => console.log('Yandex Error:', error));
        };

        // 4. ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ (ВХОД / РЕГ)
        let isLoginMode = true;
        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Войти в QID" : "Создать QID";
            document.getElementById('btn-submit-form').innerText = isLoginMode ? "Войти" : "Зарегистрироваться";
            document.getElementById('reg-fields-container').style.display = isLoginMode ? "none" : "block";
            document.getElementById('toggle-text-label').innerText = isLoginMode ? "Нет аккаунта?" : "Уже есть аккаунт?";
            document.getElementById('toggle-link-btn').innerText = isLoginMode ? "Создать QID" : "Войти";
        }

        // 5. ОБРАБОТКА ФОРМЫ (FIREBASE)
        document.getElementById('auth-form').onsubmit = async function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('reg-username').value;
            const fullname = document.getElementById('reg-fullname').value;

            try {
                if (isLoginMode) {
                    await fbAuth.signInWithEmailAndPassword(email, password);
                } else {
                    const res = await fbAuth.createUserWithEmailAndPassword(email, password);
                    await res.user.updateProfile({ displayName: username });
                    await syncProfileToSupabase(res.user, username, fullname);
                    window.location.reload();
                }
            } catch (err) {
                alert(err.message);
            }
        };

        // 6. GOOGLE AUTH
        async function signInWithGoogle() {
            try {
                const res = await fbAuth.signInWithPopup(googleProvider);
                await syncProfileToSupabase(res.user);
            } catch (err) {
                alert(err.message);
            }
        }

        // 7. СЛУШАТЕЛЬ СОСТОЯНИЯ И ЗАГРУЗКА ИЗ БАЗЫ
        fbAuth.onAuthStateChanged(async (user) => {
            const authSec = document.getElementById('auth-section');
            const profSec = document.getElementById('profile-section');

            if (user) {
                authSec.style.display = "none";
                profSec.style.display = "block";

                // Загружаем данные из таблицы profiles (Supabase)
                const { data: profile, error } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('id', user.uid)
                    .single();

                if (profile) {
                    document.getElementById('profile-display-name').innerText = "@" + (profile.username || "user");
                    document.getElementById('profile-full-name').innerText = profile.full_name || "—";
                    document.getElementById('user-avatar-img').src = profile.avatar_url;
                } else {
                    // Если профиля в базе нет (например, старый юзер), создаем его
                    await syncProfileToSupabase(user);
                }

                document.getElementById('profile-email').innerText = user.email;
                document.getElementById('profile-uid').innerText = user.uid;
            } else {
                authSec.style.display = "block";
                profSec.style.display = "none";
            }
        });
    </script>
</body>
</html>
