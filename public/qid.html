<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QID | Авторизация NEXUS-Q</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-yellow: #ffcc00;
            --nexus-primary: #6366f1;
            --nexus-secondary: #a855f7;
            --bg-light: #f3f3f5;
            --text-main: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            width: 420px;
            padding: 48px 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--nexus-primary), var(--nexus-secondary));
            border-radius: 14px;
            font-weight: 900; font-size: 28px; color: #ffffff;
            margin-bottom: 28px;
        }

        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px; border: 1px solid #e5e7eb; border-radius: 14px;
            background: white; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }

        .social-btn:hover { background: #f9fafb; border-color: #d1d5db; }

        #message-box { display: none; margin-bottom: 20px; padding: 12px; border-radius: 12px; font-size: 13px; }
        .msg-error { background: #fee2e2; color: #b91c1c; }
        .msg-success { background: #dcfce7; color: #15803d; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">Q</div>
        <h1 class="text-2xl font-bold mb-2">Войдите через QID</h1>
        <p class="text-gray-500 mb-8">NEXUS-Q Auth System</p>
        
        <div id="message-box"></div>

        <button type="button" class="social-btn" id="btn-google">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" width="18"> 
            Продолжить с Google
        </button>

        <p class="text-[10px] text-gray-400 mt-8 uppercase tracking-widest">Protected by NEXUS-Q Crypto</p>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // Исправленный URL твоего проекта
        const supabaseUrl = 'https://vfynermzgdtqmvnbzkah.supabase.co'; 
        // Вставь сюда свой полный ANON KEY из Supabase
        const supabaseAnonKey = 'ВСТАВЬ_СЮДА_ПОЛНЫЙ_КЛЮЧ_ИЗ_API_SETTINGS'; 
        
        const supabase = createClient(supabaseUrl, supabaseAnonKey);
        const msgBox = document.getElementById('message-box');

        function showMsg(text, type = 'error') {
            msgBox.textContent = text;
            msgBox.className = type === 'error' ? 'msg-error' : 'msg-success';
            msgBox.style.display = 'block';
        }

        document.getElementById('btn-google').addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin
                    }
                });
                if (error) throw error;
            } catch (err) {
                showMsg('Ошибка: ' + err.message);
            }
        });

        // Проверяем, залогинились ли мы уже
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            showMsg('Добро пожаловать, ' + (session.user.user_metadata.full_name || session.user.email), 'success');
        }
    </script>
</body>
</html>
