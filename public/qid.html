<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QID | Профиль NEXUS-Q</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>

    <style>
        :root {
            --accent-yellow: #ffcc00;
            --nexus-primary: #6366f1;
            --nexus-secondary: #a855f7;
            --bg-light: #f3f3f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            width: 420px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--nexus-primary), var(--nexus-secondary));
            border-radius: 14px;
            font-weight: 900;
            font-size: 28px;
            color: #ffffff;
            margin-bottom: 24px;
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #eee;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid var(--accent-yellow);
        }

        .avatar-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-row {
            text-align: left;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 11px;
            color: #8b8e94;
            text-transform: uppercase;
            font-weight: 700;
        }

        .info-value {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a1a;
            word-break: break-all;
        }

        .input-field {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--nexus-primary);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            background: var(--nexus-primary);
            color: white;
            transition: 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-main:hover {
            opacity: 0.9;
        }

        #auth-section, #profile-section, #reg-fields-container {
            display: none;
        }

        #buttonContainerId {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">Q</div>

        <div id="auth-section">
            <h1 id="auth-title" class="text-2xl font-bold mb-2">Войти в QID</h1>
            <p class="text-gray-500 mb-6 text-sm">Nexus-Q Ecosystem Auth</p>

            <form id="auth-form">
                <div id="reg-fields-container">
                    <input type="text" id="reg-username" placeholder="Придумайте логин" class="input-field">
                </div>
                
                <input type="email" id="auth-email" placeholder="Email" class="input-field" required>
                <input type="password" id="auth-password" placeholder="Пароль" class="input-field" required>
                
                <button type="submit" id="btn-submit-form" class="btn-main mb-4">Войти</button>
            </form>

            <p class="text-xs text-gray-400 mb-6">
                <span id="toggle-text-label">Нет аккаунта?</span> 
                <span class="text-indigo-500 font-bold cursor-pointer hover:underline" onclick="switchAuthMode()" id="toggle-link-btn">Создать QID</span>
            </p>

            <div class="relative flex py-4 items-center">
                <div class="flex-grow border-t border-gray-100"></div>
                <span class="flex-shrink mx-4 text-gray-300 text-[10px] font-bold tracking-widest uppercase">Или войти через</span>
                <div class="flex-grow border-t border-gray-100"></div>
            </div>

            <div class="flex flex-col gap-2 mt-2">
                <button type="button" class="flex items-center justify-center gap-3 w-full p-3 border border-gray-200 rounded-[20px] font-semibold text-sm hover:bg-gray-50 transition" onclick="signInWithGoogle()">
                    <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" width="18">
                    Google
                </button>
                
                <div id="buttonContainerId"></div>
            </div>
        </div>

        <div id="profile-section">
            <div class="avatar-circle">
                <img id="user-avatar-img" src="" alt="Avatar">
            </div>
            <h1 class="text-xl font-bold mb-6">Профиль QID</h1>

            <div class="info-row">
                <div class="info-label">Логин / Никнейм</div>
                <div id="profile-display-name" class="info-value text-indigo-600">@—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Email адрес</div>
                <div id="profile-email" class="info-value">—</div>
            </div>

            <button onclick="firebase.auth().signOut()" class="mt-8 text-red-500 text-sm font-bold hover:opacity-70 transition cursor-pointer">
                Выйти из аккаунта
            </button>
        </div>
    </div>

    <script>
        // 1. КОНФИГУРАЦИЯ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyB8FCa1mDuyrzPTKXL_dNeA5BtQtmK9e50",
            authDomain: "nexus-q-ceb47.firebaseapp.com",
            projectId: "nexus-q-ceb47",
            storageBucket: "nexus-q-ceb47.firebasestorage.app",
            messagingSenderId: "1089083193362",
            appId: "1:1089083193362:web:77d047bc1770f14d7080cb"
        };

        firebase.initializeApp(firebaseConfig);
        const firebaseAuth = firebase.auth();

        // 2. ИНИЦИАЛИЗАЦИЯ ЯНДЕКС ID (ДЛЯ VERCEL)
        window.onload = function() {
            // Формируем чистый Redirect URI без лишних символов
            const currentRedirectUri = window.location.origin + window.location.pathname;

            window.YaAuthSuggest.init(
                {
                    client_id: "7b84bc72719444d9bc04d72106619f4a",
                    response_type: "token",
                    redirect_uri: currentRedirectUri
                },
                window.location.origin,
                {
                    view: "button",
                    parentId: "buttonContainerId",
                    buttonSize: 'm',
                    buttonView: 'main',
                    buttonTheme: 'light',
                    buttonBorderRadius: "20",
                    buttonIcon: 'ya',
                }
            )
            .then(result => result.handler())
            .then(data => {
                console.log('Яндекс токен получен:', data);
                alert("Вход через Яндекс выполнен!");
            })
            .catch(error => console.log('Ошибка Яндекса:', error));
        };

        // 3. ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
        let currentModeIsLogin = true;
        function switchAuthMode() {
            currentModeIsLogin = !currentModeIsLogin;
            document.getElementById('auth-title').innerText = currentModeIsLogin ? "Войти в QID" : "Создать QID";
            document.getElementById('btn-submit-form').innerText = currentModeIsLogin ? "Войти" : "Зарегистрироваться";
            document.getElementById('reg-fields-container').style.display = currentModeIsLogin ? "none" : "block";
            document.getElementById('toggle-text-label').innerText = currentModeIsLogin ? "Нет аккаунта?" : "Уже есть аккаунт?";
            document.getElementById('toggle-link-btn').innerText = currentModeIsLogin ? "Создать QID" : "Войти";
        }

        // 4. FIREBASE AUTH
        document.getElementById('auth-form').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('reg-username').value;

            if (currentModeIsLogin) {
                firebaseAuth.signInWithEmailAndPassword(email, password).catch(err => alert(err.message));
            } else {
                firebaseAuth.createUserWithEmailAndPassword(email, password)
                    .then(res => res.user.updateProfile({ displayName: username }))
                    .then(() => location.reload())
                    .catch(err => alert(err.message));
            }
        };

        function signInWithGoogle() {
            firebaseAuth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(err => alert(err.message));
        }

        // 5. МОНИТОРИНГ СОСТОЯНИЯ
        firebaseAuth.onAuthStateChanged(user => {
            const authSec = document.getElementById('auth-section');
            const profSec = document.getElementById('profile-section');
            if (user) {
                authSec.style.display = "none";
                profSec.style.display = "block";
                document.getElementById('profile-display-name').innerText = "@" + (user.displayName || "user");
                document.getElementById('profile-email').innerText = user.email;
                document.getElementById('user-avatar-img').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=6366f1&color=fff&bold=true`;
            } else {
                authSec.style.display = "block";
                profSec.style.display = "none";
            }
        });
    </script>
</body>
</html>
