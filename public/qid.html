<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QID | Профиль NEXUS-Q</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-yellow: #ffcc00;
            --nexus-primary: #6366f1;
            --nexus-secondary: #a855f7;
            --bg-light: #f3f3f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #ffffff;
            border-radius: 28px;
            width: 420px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px; height: 52px;
            background: linear-gradient(135deg, var(--nexus-primary), var(--nexus-secondary));
            border-radius: 14px;
            font-weight: 900; font-size: 28px; color: #ffffff;
            margin-bottom: 24px;
        }

        .avatar-circle {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: #eee;
            margin: 0 auto 16px;
            overflow: hidden;
            border: 3px solid var(--accent-yellow);
        }

        .info-row {
            text-align: left;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .info-label { font-size: 11px; color: #8b8e94; text-transform: uppercase; font-weight: 700; }
        .info-value { font-size: 15px; font-weight: 500; color: #1a1a1a; }

        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; padding: 14px; border: 1px solid #e5e7eb; border-radius: 14px;
            background: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        .social-btn:hover { background: #f9fafb; }

        .btn-logout {
            margin-top: 20px;
            color: #ef4444;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-logout:hover { opacity: 0.7; }

        #auth-section, #profile-section { display: none; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-box">Q</div>

        <div id="auth-section">
            <h1 class="text-2xl font-bold mb-2">Войдите через QID</h1>
            <p class="text-gray-500 mb-8">Доступ к экосистеме NEXUS-Q</p>
            <button type="button" class="social-btn" id="btn-google">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_32dp.png" width="18"> 
                Продолжить с Google
            </button>
        </div>

        <div id="profile-section">
            <div class="avatar-circle">
                <img id="user-avatar" src="" alt="" onerror="this.src='https://ui-avatars.com/api/?name=User'">
            </div>
            <h1 class="text-xl font-bold mb-6">Настройки QID</h1>

            <div class="info-row">
                <div class="info-label">Имя</div>
                <div id="user-name" class="info-value">—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Email</div>
                <div id="user-email" class="info-value">—</div>
            </div>

            <div class="info-row">
                <div class="info-label">Статус ID</div>
                <div class="info-value text-green-600">Активен (Verified)</div>
            </div>

            <button id="btn-logout" class="btn-logout">Выйти из аккаунта</button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabaseUrl = 'https://vfynermzgdtqmvnbzkah.supabase.co'; 
        const supabaseAnonKey = 'ТВОЙ_ПОЛНЫЙ_ANON_KEY'; 
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        const authSection = document.getElementById('auth-section');
        const profileSection = document.getElementById('profile-section');

        // Функция обновления интерфейса
        async function updateUI() {
            const { data: { session } } = await supabase.auth.getSession();

            if (session) {
                const user = session.user;
                authSection.style.display = 'none';
                profileSection.style.display = 'block';

                // Заполняем данные из метаданных Google
                document.getElementById('user-name').textContent = user.user_metadata.full_name || 'Пользователь NEXUS';
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('user-avatar').src = user.user_metadata.avatar_url || '';
            } else {
                authSection.style.display = 'block';
                profileSection.style.display = 'none';
            }
        }

        // Вход через Google
        document.getElementById('btn-google').addEventListener('click', async () => {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
        });

        // Выход
        document.getElementById('btn-logout').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.reload(); // Перезагружаем, чтобы сбросить UI
        });

        // Запуск проверки при загрузке
        updateUI();
    </script>
</body>
</html>
